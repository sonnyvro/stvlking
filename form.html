<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Custom Beat</title>
    <style>
        body { background: #020202; color: #ff0033; font-family: 'Bebas Neue'; text-align: center; padding: 50px; }
        input, textarea { width: 80%; padding: 15px; margin: 10px 0; background: #050101; border: 1px solid #ff0033; color: white; font-family: sans-serif;}
        button { background: transparent; border: 1px solid #ff0033; color: white; padding: 15px 30px; cursor: pointer; font-size: 1.5rem; transition: 0.3s; }
        button:hover { background: #ff0033; color: black; }
    </style>
</head>
<body>
    <h1>REQUEST CUSTOM BEAT</h1>
    <form action="https://formspree.io/f/mojorqnz" method="POST">
        <input type="text" name="name" placeholder="Your Name" required><br>
        <input type="email" name="email" placeholder="Your Email" required><br>
        <textarea name="message" placeholder="Describe the vibe you want..." rows="10"></textarea><br>
        <button type="submit">SEND REQUEST</button>
    </form>
</body>
</html>
