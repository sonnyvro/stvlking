<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Custom Beat | stvlking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020202;
            --box-bg: #050101;
            --neon-color: #ff0033;
            --neon-dim: rgba(255, 0, 51, 0.15); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-color); 
            color: #ccc; 
            overflow-x: hidden; 
            cursor: none; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- CUSTOM CURSOR --- */
        .cursor { width: 10px; height: 10px; background: var(--neon-color); border-radius: 50%; position: fixed; pointer-events: none; z-index: 999999; box-shadow: 0 0 10px var(--neon-color); }

        /* --- FILM GRAIN & STATIC FX (Softened) --- */
        .film-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9997;
            background: url('https://www.transparenttextures.com/patterns/noise-lines.png'), url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.08; 
            animation: static-flicker 0.4s steps(4) infinite; 
        }
        .vhs-tracking {
            position: fixed; top: 0; left: 0; width: 100%; height: 10vh;
            background: rgba(255, 255, 255, 0.01); filter: blur(4px); 
            z-index: 9998; pointer-events: none;
            animation: tracking-scroll 8s infinite linear; 
        }

        /* --- GHOSTLY TEXT FX (Softened) --- */
        h1, h2, label, p, button, .ghost-text { 
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            animation: ghostly-flicker 4s infinite ease-in-out; 
        }
        
        /* --- FORM CONTAINER --- */
        .content-box { 
            background: var(--box-bg); 
            border: 1px solid var(--neon-color); 
            padding: 40px; 
            width: 100%; 
            max-width: 700px; 
            color: #fff; 
            animation: pulse-glow 4s infinite ease-in-out; 
            position: relative; 
            z-index: 10; 
        }

        .header-section { text-align: center; margin-bottom: 30px; border-bottom: 1px dashed var(--neon-dim); padding-bottom: 20px; }
        h1 { font-family: 'Bebas Neue'; font-size: 3.5rem; color: var(--neon-color); letter-spacing: 5px; margin-bottom: 5px; }
        .subtitle { font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; color: #ffccd5; opacity: 0.5; }

        /* --- COMPLEX FORM ELEMENTS --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; font-family: 'Bebas Neue'; font-size: 1.3rem; margin-bottom: 8px; color: #fff; letter-spacing: 1px; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; 
            background: rgba(5, 1, 1, 0.8); 
            border: 1px solid var(--neon-dim); 
            color: #ffccd5; 
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--neon-color); box-shadow: inset 0 0 10px var(--neon-dim), 0 0 10px var(--neon-dim); background: #000; }
        
        /* Stylized Select */
        select { cursor: none; appearance: none; -webkit-appearance: none; background-image: linear-gradient(45deg, transparent 50%, var(--neon-color) 50%), linear-gradient(135deg, var(--neon-color) 50%, transparent 50%); background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px); background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
        option { background: var(--bg-color); color: #fff; }

        button[type="submit"] { 
            width: 100%; background: transparent; border: 1px solid var(--neon-color); 
            color: var(--neon-color); padding: 20px; cursor: none; 
            font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 3px;
            transition: 0.3s; margin-top: 10px;
        }
        button[type="submit"]:hover { background: var(--neon-color); color: #000; box-shadow: 0 0 20px var(--neon-color); transform: scale(1.02); }

        /* --- ANIMATIONS --- */
        @keyframes static-flicker { 0% { background-position: 0 0; } 50% { background-position: -5px 5px; } 100% { background-position: 5px -5px; } }
        @keyframes tracking-scroll { 0% { top: -20%; } 100% { top: 120%; } }
        @keyframes ghostly-flicker { 0%, 100% { opacity: 1; filter: blur(0px); } 50% { opacity: 0.9; filter: blur(0.3px); transform: translateY(-0.2px); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px var(--neon-dim); } 50% { box-shadow: 0 0 12px var(--neon-dim); } }

        /* Responsive */
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <div class="film-grain"></div>
    <div class="vhs-tracking"></div>

    <div class="content-box">
        <div class="header-section">
            <h1 id="ui-title">LOADING...</h1>
            <p class="subtitle" id="ui-subtitle">...</p>
        </div>
        
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID_HERE" method="POST">
            
            <div class="form-grid">
                <div>
                    <label for="name" id="ui-lbl-name">Alias</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email" id="ui-lbl-email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="full-width">
                    <label for="vibe" id="ui-lbl-vibe">Vibe</label>
                    <select name="vibe" id="vibe">
                        <option value="none" id="ui-opt-vibe" disabled selected>-- Select --</option>
                        <option value="dark-trap">Dark / Aggressive Trap</option>
                        <option value="ambient">Ambient / Eerie Cinematic</option>
                        <option value="alternative">Alternative / Gritty</option>
                        <option value="custom">Other (Describe heavily below)</option>
                    </select>
                </div>

                <div>
                    <label for="bpm" id="ui-lbl-bpm">Target BPM (Optional)</label>
                    <input type="text" id="bpm" name="bpm" placeholder="e.g., 140, 90-100">
                </div>
                <div>
                    <label for="references" id="ui-lbl-ref">References (Optional)</label>
                    <input type="url" id="references" name="references" placeholder="YouTube, Spotify, Soundcloud...">
                </div>

                <div class="full-width">
                    <label for="message" id="ui-lbl-msg">Details</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
            </div>
            
            <button type="submit" id="ui-btn">SEND</button>
        </form>
    </div>

    <script>
        // --- RANDOM THEME GENERATOR ---
        const themes = [
            {
                title: "INITIATE_CUSTOM_PROTOCOL",
                subtitle: "// Establish neural link for audio generation",
                lblName: "Alias / Artist Name", plcName: "Who are you?",
                lblEmail: "Contact Beacon (Email)", plcEmail: "Where do I send it?",
                lblVibe: "Primary Sonic Aesthetic", plcVibe: "-- Select an atmosphere --",
                lblBPM: "Target BPM (Optional)",
                lblRef: "Reference Links (Optional)",
                lblMsg: "Detailed Vision", plcMsg: "Describe the mood, instrumentation, structure, or any specific elements you need...",
                btn: "TRANSMIT REQUEST"
            },
            {
                title: "SUMMON A SOUNDSCAPE",
                subtitle: "...describe the nightmare you wish to hear...",
                lblName: "What do they call you? (Alias)", plcName: "Your artist name...",
                lblEmail: "Where can I haunt you? (Email)", plcEmail: "Your contact beacon...",
                lblVibe: "Choose Your Atmosphere", plcVibe: "-- Choose your poison --",
                lblBPM: "Heartbeat (Target BPM - Optional)",
                lblRef: "Echoes of Others (Reference Links)",
                lblMsg: "Flesh Out The Details", plcMsg: "Describe the mood, the instruments of torture, the structure, or any specific dread you want to inflict on the listener...",
                btn: "SEAL THE PACT"
            },
            {
                title: "OPEN A DOSSIER",
                subtitle: "...tell me exactly what you're looking for...",
                lblName: "Alias (Who are you?)", plcName: "Leave a name...",
                lblEmail: "Drop Location (Email)", plcEmail: "Where can I find you?",
                lblVibe: "Sonic Profile", plcVibe: "-- Select a trace --",
                lblBPM: "Pulse (Target BPM - Optional)",
                lblRef: "Evidence (Reference Links - Optional)",
                lblMsg: "The Specifics", plcMsg: "Describe the exact mood, the structure, the feeling... leave nothing out. I need to know exactly what you want...",
                btn: "LEAVE THE DROP"
            }
        ];

        // Pick a random theme
        const t = themes[Math.floor(Math.random() * themes.length)];

        // Apply it to the DOM
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('ui-subtitle').innerText = t.subtitle;
        document.getElementById('ui-lbl-name').innerText = t.lblName;
        document.getElementById('name').placeholder = t.plcName;
        document.getElementById('ui-lbl-email').innerText = t.lblEmail;
        document.getElementById('email').placeholder = t.plcEmail;
        document.getElementById('ui-lbl-vibe').innerText = t.lblVibe;
        document.getElementById('ui-opt-vibe').innerText = t.plcVibe;
        document.getElementById('ui-lbl-bpm').innerText = t.lblBPM;
        document.getElementById('ui-lbl-ref').innerText = t.lblRef;
        document.getElementById('ui-lbl-msg').innerText = t.lblMsg;
        document.getElementById('message').placeholder = t.plcMsg;
        document.getElementById('ui-btn').innerText = t.btn;


        // --- CUSTOM CURSOR LOGIC ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { 
            cursor.style.left = e.clientX + 'px'; 
            cursor.style.top = e.clientY + 'px'; 
        });

        const inputs = document.querySelectorAll('input, select, textarea, button');
        inputs.forEach(input => {
            input.addEventListener('mouseenter', () => cursor.style.transform = 'scale(1.5)');
            input.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
        });
    </script>
</body>
</html>
