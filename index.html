<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SONNYVRO // STVLKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --panel: #0a0000;
            --red: #ff0000;
            --dim-red: #330000;
            --text: #e0a0a0;
        }

        body { 
            background-color: var(--bg) !important; 
            color: var(--text) !important; 
            font-family: 'VT323', monospace; 
            margin: 0;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* 3D Viewport Setup */
        #viewport { width: 100vw; min-height: 100vh; }
        #camera { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        /* The Stacked Layout */
        .layout-stack {
            display: grid;
            grid-template-columns: 1fr; /* Single column stack */
            gap: 40px; /* Large gaps for "breathing room" */
            max-width: 700px; /* Keeps the "document" look narrow */
            margin: 60px auto;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-family: 'Press Start 2P'; color: var(--red); font-size: 2rem; }

        /* BIGGER BOXES */
        .box { 
            border: 1px solid var(--red); 
            background: var(--panel); 
            padding: 30px; 
            min-height: 350px; /* Much taller */
            position: relative;
        }

        /* The Roof Effect */
        .box::before { 
            content: ""; position: absolute; top: -8px; left: -1px; right: -1px; height: 8px; 
            background: var(--red); clip-path: polygon(0% 100%, 5% 0%, 95% 0%, 100% 100%);
        }

        .box-title { font-family: 'Press Start 2P'; font-size: 0.8rem; color: var(--red); margin-bottom: 20px; border-bottom: 1px solid var(--dim-red); padding-bottom: 10px; }

        .home-btn { 
            background: transparent; border: 2px solid var(--red); 
            color: var(--red); padding: 20px; cursor: pointer; font-family: 'Press Start 2P';
            font-size: 1rem; width: 100%; margin-bottom: 100px;
        }
        .home-btn:hover { background: var(--red); color: black; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="camera">
            <main class="layout-stack">
                <header>
                    <h1>SONNYVRO // STVLKING</h1>
                </header>

                <section class="box"><div class="box-title">STVLKER</div><p>Content goes here...</p></section>
                <section class="box"><div class="box-title">SONNYVRO</div><p>Content goes here...</p></section>
                <section class="box"><div class="box-title">PICS</div><p>Content goes here...</p></section>
                <section class="box"><div class="box-title">BLOG</div><p>Content goes here...</p></section>
                <section class="box"><div class="box-title">BEATS FOR SALE</div><p>Content goes here...</p></section>
                <section class="box"><div class="box-title">LINKS</div><p>Content goes here...</p></section>
                
                <button class="home-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">[ RETURN HOME ]</button>
            </main>
        </div>
    </div>

</body>
</html>
