<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; color: #d1d1d1; overflow-x: hidden; }

        /* LAYER 1: BACKGROUND EFFECTS (Fixed, low z-index) */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .lightning { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1; animation: lightning 12s linear infinite; opacity: 0; }
        .floating-gif { position: fixed; width: 100px; opacity: 0.3; z-index: 1; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.15; } 97% { opacity: 0.05; } }

        /* LAYER 2: SITE CONTENT (Relative, higher z-index) */
        #main-content { position: relative; z-index: 10; width: 100%; }

        /* UI/LOADING */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; color: #e60000; font-family: 'Bebas Neue'; font-size: 2rem; transition: opacity 0.5s; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; justify-content: center; align-items: center; }
        .enter-btn { padding: 20px 40px; font-family: 'Bebas Neue'; font-size: 2.5rem; background: transparent; color: #e60000; border: 2px solid #e60000; cursor: pointer; }
        
        /* CONTENT STYLING */
        header { display: flex; justify-content: space-between; padding: 20px 10%; background: #111; border-bottom: 2px solid #e60000; }
        .main-container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        .hero { text-align: center; padding: 100px 20px; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .track-card { background: #111; border: 1px solid #222; padding: 20px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .shop-card { background: #111; padding: 30px; border: 1px solid #e60000; }
        footer { text-align: center; padding: 40px; border-top: 2px solid #e60000; }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader-text">LOADING THE VOID...</div></div>

    <div id="start-screen">
        <button class="enter-btn" onclick="startAudio()">ENTER THE VOID</button>
    </div>

    <div id="bg-canvas">
        <div class="lightning"></div>
        <img src="bone.gif" class="floating-gif" style="top: 20%; left: 5%;">
        <img src="crow.gif" class="floating-gif" style="top: 60%; right: 5%;">
    </div>

    <main id="main-content">
        <header>
            <div class="logo"><img src="logo.png" style="height: 50px;"></div>
            <nav><ul><li style="display:inline; margin: 10px;"><a href="#music" style="color:white;">Music</a></li></ul></nav>
        </header>

        <section class="hero">
            <h1>SONNYVRO/STVLKING</h1>
        </section>

        <div class="main-container" id="music">
            <div class="music-grid">
                <div class="track-card"><h3>hurt.mp3</h3><audio controls></audio></div>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        });

        function startAudio() {
            document.getElementById('bg-audio')?.play();
            document.getElementById('start-screen').style.display = 'none';
        }
    </script>
</body>
</html>
