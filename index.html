<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SONNYVRO // STVLKING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Background -->
<div id="world">

    <div id="sky"></div>

    <div id="stars"></div>

    <div id="moon"></div>

    <div id="clouds"></div>

    <div id="lightning"></div>
    <div id="flash"></div>
    <div id="city"></div>

    <div id="fog"></div>

    <div id="rain"></div>

</div>

<!-- Main Shrine -->

<main id="scene">

    <header>

        <h1>SONNYVRO</h1>

        <p>STVLKING</p>

    </header>

    <section id="shrine">

        <div id="roof"></div>

        <div id="building">

            <div class="menu">

                <button id="stockBtn">STOCK</button>

                <button id="customBtn">CUSTOM</button>

                <button id="miscBtn">MISC</button>

            </div>

            <div class="panel">

                <h2>NOW PLAYING</h2>

                <div class="screen">

                    NO TRACK LOADED

                </div>

            </div>

            <div class="panel">

                <h2>ABOUT</h2>

                <p>

                Welcome to the Shrine.

                </p>

            </div>

        </div>

    </section>

</main>

<script src="js/app.js"></script>

</body>
</html>
