<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SONNYVRO // STVLKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --panel: rgba(10, 0, 0, 0.85); --red: #ff0000; --dim-red: #330000; --text: #e0a0a0; }
        
        body.hacked { --red: #00ff33; --dim-red: #004400; --text: #a0e0a0; --panel: rgba(0, 25, 0, 0.85); }
        
        body { background-color: var(--bg) !important; color: var(--text) !important; font-family: 'VT323', monospace; margin: 0; overflow: hidden; cursor: crosshair; }

        /* Layers */
        #clouds-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('clouds.png') repeat-x; opacity: 0.3; z-index: 1; animation: drift 60s linear infinite; pointer-events: none; }
        #rain-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
        #monitor-shell { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10000; box-shadow: inset 0 0 100px 30px rgba(0,0,0,0.8); }
        #crt-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; background: linear-gradient(rgba(0,0,0,0.25) 50%, transparent 50%); background-size: 100% 4px; opacity: 0.2; }
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 1s ease-in-out; }
        
        @keyframes drift { from { background-position: 0 0; } to { background-position: 1000px 0; } }
        
        /* Existing Layout Styles... (Keep your existing .layout-stack, .box, etc.) */
    </style>
</head>
<body>
    <div id="clouds-layer"></div>
    <canvas id="rain-layer"></canvas>
    <div id="monitor-shell"></div>
    <div id="crt-overlay"></div>
    <div id="transition-overlay"></div>
    
    <script>
    // Rain Effect
    const canvas = document.getElementById('rain-layer');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const drops = [];
    for(let i = 0; i < 100; i++) drops.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, l: Math.random()*10});
    
    function drawRain() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        drops.forEach(d => {
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x, d.y + d.l);
            ctx.stroke();
            d.y += 5;
            if(d.y > canvas.height) d.y = 0;
        });
        requestAnimationFrame(drawRain);
    }
    drawRain();
    
    // ... Keep your existing Audio and Transition Scripts ...
</script>
</body>
</html>
