<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020202;
            --box-bg: #050101;
            --neon-color: #ff0033;
            --neon-core: #ffffff;
            --neon-dim: rgba(255, 0, 51, 0.2);
            --flip-speed: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: #ccc; overflow-x: hidden; cursor: none; } /* Cursor hidden to show custom one */

        /* --- CUSTOM CURSOR --- */
        .cursor { width: 10px; height: 10px; background: var(--neon-color); border-radius: 50%; position: fixed; pointer-events: none; z-index: 999999; box-shadow: 0 0 10px var(--neon-color); }

        /* --- BACKGROUND FX --- */
        #bg-video, #bg-gif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; filter: blur(3px) grayscale(90%) brightness(0.6); opacity: 0.2; }
        #clouds-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 50vh; background-image: url('clouds.png'); background-size: cover; background-position: top center; opacity: 0.6; pointer-events: none; z-index: 1; -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 100%); mask-image: linear-gradient(to bottom, black 10%, transparent 100%); }
        #cracks-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9996; }
        .crack-mark { position: absolute; width: 150px; height: 150px; background: url('https://www.transparenttextures.com/patterns/cracked-glass.png'); opacity: 0.4; pointer-events: none; filter: invert(1) drop-shadow(0 0 5px var(--neon-color)); }
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/rain.png'); opacity: 0.05; pointer-events: none; z-index: 9997; animation: rain-move 10s linear infinite; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/noise-lines.png'); opacity: 0.04; pointer-events: none; z-index: 9998; }
        #logo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('logo.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.03; z-index: 1; pointer-events: none; filter: blur(3px); }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon-color); pointer-events: none; z-index: 2; animation: lightning 15s linear infinite; mix-blend-mode: overlay; }
        #custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9995; background-size: cover; background-position: center; opacity: 0.25; display: none; }

        /* --- UI COMPONENTS --- */
        .content-box { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 30px; margin: 20px auto; max-width: 800px; color: #fff; animation: pulse-glow 3s infinite ease-in-out; position: relative; z-index: 5; transition: 0.3s; }
        .nav-btn, .upload-label { background: transparent; border: 1px solid var(--neon-dim); color: #fff; padding: 10px 20px; font-family: 'Bebas Neue'; cursor: pointer; margin: 10px; transition: 0.3s; font-size: 1.2rem; }
        .nav-btn:hover { border-color: var(--neon-color); transform: scale(1.1); box-shadow: 0 0 20px var(--neon-color); }
        .shop-card { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 15px 20px; cursor: pointer; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 220px; transition: 0.3s; }
        .shop-card:hover { transform: translateY(-10px); border-color: var(--neon-color); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .enter-btn { padding: 15px 30px; font-family: 'Bebas Neue'; font-size: 2rem; background: transparent; color: var(--neon-color); border: 2px solid var(--neon-color); cursor: pointer; }
        
        /* About Me Glitch Effect */
        .glitch-about:hover { animation: ghostly-glitch 0.5s infinite; }

        /* --- LOADING & ANIMATIONS --- */
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; transition: opacity 0.2s; }
        #transition-overlay.active { opacity: 1; }
        .page-section { display: none; }
        .active { display: block; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--neon-dim); } 50% { box-shadow: 0 0 25px var(--neon-color); } }
        @keyframes ghostly-glitch { 0%, 100% { transform: translate(0); } 25% { transform: translate(-2px, 2px); } 50% { transform: translate(2px, -2px); } }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div id="transition-overlay"><div class="vhs-text" style="color:white; font-family:'Bebas Neue';">LOADING...</div></div>
    
    <video id="bg-video" loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
    <img id="bg-gif" style="display: none;" alt="Background GIF">
    <div id="clouds-overlay"></div>
    <div id="custom-overlay"></div>
    <div id="logo-overlay"></div>
    <div id="cracks-container"></div>
    <div class="rain"></div>
    <div class="lightning"></div>
    <audio id="bg-audio" loop></audio>

    <div id="start-screen" style="position: fixed; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center;">
        <button class="enter-btn" onclick="startAudio()">ENTER</button>
    </div>

    <div id="site-wrapper">
        <header style="text-align: center; padding-top: 50px;">
            <h1 class="glitch-text" style="font-size: 4rem;">SONNYVRO/STVLKING</h1>
        </header>

        <main class="main-container">
            <div style="text-align: center;">
                <button class="nav-btn" onclick="showPage('home-section')">HOME</button>
                <button class="nav-btn" onclick="showPage('about-section')">ABOUT ME</button>
            </div>

            <div id="content-flipper">
                <div id="home-section" class="page-section active">
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 40px;">
                        <a href="https://air.bi/nXZu4" target="_blank" class="shop-card"><h3>STOCK</h3></a>
                        <div class="shop-card" onclick="alert('Contact for Custom Beats!')"><h3>Custom Beats</h3></div>
                        <a href="https://cash.app/$sonnyvro" target="_blank" style="text-decoration:none;"><div class="shop-card"><h3>Premade Beats</h3></div></a>
                    </div>
                </div>

                <div id="about-section" class="page-section">
                    <div class="content-box glitch-about">
                        <h2>WHO AM I?</h2>
                        <p>21, USA. Producing dark, atmospheric beats.</p>
                        <p style="margin-top:10px; font-size: 0.8rem; opacity: 0.6;">(Hover over this card to see me glitch)</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const pageTracks = {
            'home-section': { file: 'killing.mp3' },
            'about-section': { file: 'letmefall.mp3' }
        };

        function startAudio() { 
            const audio = document.getElementById('bg-audio');
            audio.volume = 0.3; 
            audio.src = pageTracks['home-section'].file;
            audio.play(); 
            document.getElementById('start-screen').style.display = 'none'; 
            document.getElementById('bg-video').play();
        }

        function showPage(pageId) {
            const target = document.getElementById(pageId);
            const transition = document.getElementById('transition-overlay');
            transition.classList.add('active');
            setTimeout(() => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                target.classList.add('active');
                if (pageTracks[pageId]) {
                    const audio = document.getElementById('bg-audio');
                    audio.src = pageTracks[pageId].file;
                    audio.play();
                }
                setTimeout(() => transition.classList.remove('active'), 200);
            }, 600);
        }
    </script>
</body>
</html>
