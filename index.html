<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: #020202; color: #888; overflow-x: hidden; cursor: crosshair; }

        /* Ambient Layers */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 0, 0, 0.03)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 9996; }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; z-index: 9997; animation: lightning 12s linear infinite; }
        @keyframes lightning { 0%, 95%, 98% { opacity: 0; } 96% { opacity: 0.15; } 97% { opacity: 0.05; } }

        /* Modal Styles */
        #service-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; padding: 40px; border: 2px solid #e60000; text-align: center; max-width: 500px; color: #fff; }
        .close-btn { margin-top: 20px; color: #e60000; cursor: pointer; text-transform: uppercase; font-family: 'Bebas Neue'; }

        /* Site Content */
        #site-wrapper { position: relative; z-index: 1; }
        .main-container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        .shop-card { background: #0a0a0a; border: 1px solid #1a0000; padding: 25px; cursor: pointer; transition: 0.4s; color: #888; text-decoration: none; display: block; }
        .shop-card:hover { border-color: #e60000; box-shadow: 0 0 20px rgba(230, 0, 0, 0.2); color: #fff; }
        .hero { text-align: center; padding: 150px 20px; background: radial-gradient(circle at center, #1a0000 0%, #020202 70%); }
        .enter-btn { padding: 15px 30px; font-family: 'Bebas Neue'; font-size: 1.5rem; background: transparent; color: #e60000; border: 2px solid #e60000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="service-modal">
        <div class="modal-content">
            <h2 id="modal-title">Service Details</h2>
            <p id="modal-desc" style="margin: 20px 0;">Details about the service will appear here.</p>
            <div class="close-btn" onclick="closeModal()">Close Window</div>
        </div>
    </div>

    <div id="start-screen" style="position: fixed; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center;">
        <button class="enter-btn" onclick="startAudio()">ENTER THE VOID</button>
    </div>

    <div class="lightning"></div>

    <div id="site-wrapper">
        <header style="padding: 20px 10%; border-bottom: 2px solid #1a0000;">
            <div class="logo" style="font-family: 'Bebas Neue'; font-size: 1.5rem;">SONNYVRO</div>
        </header>

        <section class="hero">
            <h1>SONNYVRO/STVLKING</h1>
        </section>

        <main class="main-container">
            <h2 style="color:#fff;">Shop Services</h2>
            <div class="shop-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top:40px;">
                
                <div class="shop-card" onclick="openModal('Custom Beats', 'Custom made for your vision! Includes stems and exclusive rights. Price starts at $100+. DM or email to discuss project details.')">
                    <h3>Custom Beats</h3>
                </div>

                <a href="https://cash.app/$sonnyvro" target="_blank" style="text-decoration:none;">
                    <div class="shop-card">
                        <h3>Premade Beats</h3>
                        <p style="margin-top:10px; font-size: 0.9rem;">$30 - $50 (Click to purchase - SPECIFY WHICH BEAT)</p>
                    </div>
                </a>
            </div>
        </main>
    </div>

    <script>
        function openModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('service-modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('service-modal').style.display = 'none';
        }
        function startAudio() {
            document.getElementById('start-screen').style.display = 'none';
        }
    </script>
</body>
</html>
