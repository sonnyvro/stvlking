<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SONNYVRO // STVLKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        /* 1. STRICT COLOR PALETTE */
        :root {
            --bg: #000000;
            --panel: rgba(10, 0, 0, 0.85); 
            --red: #ff0000;
            --dim-red: #330000;
            --text: #e0a0a0;
        }

        /* 2. THE DIMMED WALLPAPER */
        body { 
            background-color: #000000 !important; 
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                url('wallpaper.jpg'); 
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: var(--text) !important; 
            font-family: 'VT323', monospace; 
            margin: 0; 
            overflow-x: hidden; 
            perspective: 1000px;
        }

        /* 3. THE UNAFFECTED CLOUD LAYER */
        #clouds-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('clouds.png'); 
            background-repeat: repeat-x;
            opacity: 0.7; 
            z-index: 1;
            pointer-events: none;
            animation: cloudDrift 120s linear infinite;
        }
        @keyframes cloudDrift { from { background-position: 0 0; } to { background-position: 1000px 0; } }

        /* 4. RAIN & CAMERA */
        #rain-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #viewport { position: relative; z-index: 3; width: 100vw; min-height: 100vh; }
        #camera { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        .pan-left { transform: rotateY(90deg) translateZ(200px); opacity: 0; }
        .pan-right { transform: rotateY(-90deg) translateZ(200px); opacity: 0; }
        .pan-up { transform: rotateX(-90deg) translateZ(200px); opacity: 0; }
        .pan-down { transform: rotateX(90deg) translateZ(200px); opacity: 0; }

        /* 5. STACK LAYOUT & BOXES */
        .layout-stack { display: grid; grid-template-columns: 1fr; gap: 25px; max-width: 600px; margin: 40px auto; padding: 20px; }
        
        header { text-align: center; margin-bottom: 20px; padding: 20px; border: 1px solid var(--dim-red); background: var(--panel); }
        
        /* 6. NEON FLICKER TEXT (Cleaned up for readability) */
        h1 { 
            font-family: 'Press Start 2P'; 
            color: var(--red); 
            font-size: 2rem; 
            margin: 0; 
            animation: neonFlicker 4s infinite; 
        }

        @keyframes neonFlicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 5px var(--red), 0 0 15px var(--red); /* Softer, tighter glow */
            }
            20%, 24%, 55% { 
                opacity: 0.6; /* Doesn't get quite as dark, making it easier to read mid-flicker */
                text-shadow: none; 
            }
        }

        .box { border: 1px solid var(--dim-red); background: var(--panel); padding: 25px; min-height: 200px; position: relative; }
        .box::before { content: ""; position: absolute; top: -8px; left: -1px; right: -1px; height: 8px; background: var(--dim-red); clip-path: polygon(0% 100%, 5% 0%, 95% 0%, 100% 100%); }
        .box-title { font-family: 'Press Start 2P'; font-size: 0.8rem; color: var(--red); margin-bottom: 20px; border-bottom: 1px solid var(--dim-red); padding-bottom: 10px; }

        .links a { display: block; color: var(--text); text-decoration: none; margin: 10px 0; }
        .links a:hover { color: var(--red); padding-left: 5px; }

        .home-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 20px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 0.8rem; transition: 0.3s; width: 100%; margin-bottom: 100px; }
        .home-btn:hover { background: var(--red); color: #000000; }
    </style>
</head>
<body>

    <div id="clouds-layer"></div>
    <canvas id="rain-canvas"></canvas>

    <div id="viewport">
        <div id="camera">
            <main class="layout-stack">
                <header id="main-header" class="rain-collider">
                    <h1>SONNYVRO // STVLKING</h1>
                </header>

                <section class="box rain-collider"><div class="box-title">STVLKER</div></section>
                <section class="box rain-collider"><div class="box-title">SONNYVRO</div></section>
                <section class="box rain-collider"><div class="box-title">PICS</div></section>
                <section class="box rain-collider"><div class="box-title">BLOG</div></section>
                <section class="box rain-collider"><div class="box-title">BEATS FOR SALE</div><a href="#" class="nav-link" data-dir="pan-right">AIRBIT LINK</a></section>
                <section class="box rain-collider"><div class="box-title">LINKS</div><nav class="links"><a href="#">DISCORD</a><a href="#">TWITTER</a></nav></section>
                
                <button class="home-btn rain-collider" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">[ RETURN HOME ]</button>
            </main>
        </div>
    </div>

    <script>
        // Advanced Rain Collision Logic
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        // Grab everything the rain can hit
        const colliders = document.querySelectorAll('.rain-collider');
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        let drops = [];
        function createDrop() { return { x: Math.random() * canvas.width, y: -10, speed: 2 + Math.random() * 3 }; }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000'; 
            
            // Get fresh positions every frame in case of scrolling
            const rects = Array.from(colliders).map(el => el.getBoundingClientRect());

            // Increased drop count slightly since they disappear now
            if (drops.length < 150) drops.push(createDrop());
            
            drops.forEach(d => {
                let hit = false;
                
                // Check if the drop crosses the top boundary of any box
                for (let r of rects) {
                    if (d.y >= r.top && d.y <= r.top + 10 && d.x > r.left && d.x < r.right) {
                        hit = true;
                        break;
                    }
                }

                // If it hits a box OR goes off the bottom of the screen, reset it
                if (hit || d.y > canvas.height) {
                    d.y = -10 - Math.random() * 20; 
                    d.x = Math.random() * canvas.width;
                } else {
                    d.y += d.speed;
                    ctx.fillRect(d.x, d.y, 2, 6);
                }
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 3D Camera Pan logic
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const camera = document.getElementById('camera');
                camera.classList.add(this.getAttribute('data-dir'));
                setTimeout(() => { window.location.href = this.getAttribute('href'); }, 1200);
            });
        });
    </script>
</body>
</html>
