<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonnyvro | stvlking</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020202;
            --box-bg: #050101;
            --neon-color: #ff0033;
            --neon-core: #ffffff;
            --neon-dim: rgba(255, 0, 51, 0.2);
            --flip-speed: 0.5s;
        }

        /* Digestive/Squishy Theme */
        body.internal-mode { 
            --bg-color: #2e090f; 
            --box-bg: #5d0f1b; 
            --neon-color: #ff6b6b; 
            --neon-dim: #ffb3ba; 
            color: #ffccd5; 
            background: radial-gradient(circle at center, #781d28 0%, #2e090f 100%);
        }

        /* Hide everything else in Internal Mode */
        body.internal-mode #bg-video,
        body.internal-mode #bg-gif,
        body.internal-mode #clouds-overlay,
        body.internal-mode #cracks-container,
        body.internal-mode .rain,
        body.internal-mode body::after,
        body.internal-mode body::before,
        body.internal-mode #logo-overlay,
        body.internal-mode .lightning,
        body.internal-mode #custom-overlay {
            display: none !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: #ccc; overflow-x: hidden; cursor: crosshair; transition: background 0.5s; }

        /* --- BACKGROUND FX --- */
        #bg-video, #bg-gif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; filter: blur(3px) grayscale(90%) brightness(0.6); opacity: 0.2; }
        #clouds-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 50vh; background-image: url('clouds.png'); background-size: cover; background-position: top center; opacity: 0.6; pointer-events: none; z-index: 1; -webkit-mask-image: linear-gradient(to bottom, black 10%, transparent 100%); mask-image: linear-gradient(to bottom, black 10%, transparent 100%); }
        #cracks-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9996; }
        .drip { position: fixed; width: 8px; height: 20px; background: rgba(255, 180, 180, 0.4); border-radius: 5px; z-index: 1000; pointer-events: none; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh); } }
        
        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/rain.png'); opacity: 0.05; pointer-events: none; z-index: 9997; animation: rain-move 10s linear infinite; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/noise-lines.png'); opacity: 0.04; pointer-events: none; z-index: 9998; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 0, 0, 0.04)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1; }
        #logo-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('logo.png'); background-repeat: no-repeat; background-position: center; background-size: 40%; opacity: 0.03; z-index: 1; pointer-events: none; filter: blur(3px); }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon-color); pointer-events: none; z-index: 2; animation: lightning 15s linear infinite; mix-blend-mode: overlay; }
        #custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9995; background-size: cover; background-position: center; opacity: 0.25; display: none; }

        /* UI Components */
        .content-box { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 30px; margin: 20px auto; max-width: 800px; color: #fff; animation: pulse-glow 3s infinite ease-in-out; position: relative; z-index: 5; transition: 0.5s; }
        .internal-mode .content-box { border-radius: 50px 20px; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); border: 2px solid #ffb3ba; animation: squish 4s infinite ease-in-out; }
        @keyframes squish { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .nav-btn { background: transparent; border: 1px solid var(--neon-dim); color: inherit; padding: 10px 20px; font-family: 'Bebas Neue'; cursor: pointer; margin: 10px; font-size: 1.2rem; }
        .nav-btn:hover { border-color: var(--neon-color); box-shadow: 0 0 15px var(--neon-color); }
        .shop-card { background: var(--box-bg); border: 1px solid var(--neon-color); padding: 15px 20px; cursor: pointer; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; width: 220px; min-height: 90px; }
        
        .media-list { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 20px; }
        .media-item { width: 100%; max-width: 500px; border: 3px solid var(--neon-color); border-radius: 20px; transition: 0.3s; }
        .internal-mode .media-item { border-color: #ffb3ba; }

        .page-section { display: none; }
        .active { display: block; }
        #transition-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 99999; pointer-events: none; opacity: 0; display: flex; justify-content: center; align-items: center; transition: opacity 0.2s; }
        #transition-overlay.active { opacity: 1; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px var(--neon-dim); } 50% { box-shadow: 0 0 25px var(--neon-color); } }
    </style>
</head>
<body>

    <div id="transition-overlay"><div class="vhs-text" style="color:white; font-family:'Bebas Neue'; font-size:3rem;">LOADING...</div></div>
    <video id="bg-video" loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
    <img id="bg-gif" style="display: none;" alt="Background GIF">
    <div id="clouds-overlay"></div>
    <div id="custom-overlay"></div>
    <div id="cracks-container"></div>
    <div class="rain"></div>
    <div class="lightning"></div>
    <audio id="bg-audio" loop></audio>
    <audio id="ambient-audio" loop></audio>

    <div id="start-screen" style="position: fixed; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center;">
        <button onclick="startAudio()" style="background:transparent; color: #f00; font-family:'Bebas Neue'; font-size: 3rem; border:2px solid #f00; padding:20px; cursor:pointer;">ENTER</button>
    </div>

    <div id="site-wrapper">
        <main class="main-container">
            <div style="text-align: center; padding-top: 50px;">
                <button class="nav-btn" onclick="showPage('home-section')">HOME</button>
                <button class="nav-btn" onclick="showPage('about-section')">ABOUT ME</button>
                <button class="nav-btn" onclick="accessHost()">HOST</button>
            </div>

            <div id="content-flipper">
                <div id="home-section" class="page-section active">
                    <div class="content-box"><h1>SONNYVRO/STVLKING</h1></div>
                </div>

                <div id="about-section" class="page-section">
                    <div class="content-box"><h2>WHO AM I?</h2><p>21, USA. Producing dark, atmospheric beats.</p></div>
                </div>

                <div id="host-section" class="page-section">
                    <div class="content-box" style="text-align: center;">
                        <h2 style="font-family: cursive; margin-bottom: 20px;">♡ Internal Archive ♡</h2>
                        <div class="media-list" id="host-media-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const HOST_PASSWORD = "gorevoreandlore"; 
        const pageTracks = {
            'home-section': { file: 'killing.mp3' },
            'about-section': { file: 'letmefall.mp3' },
            'host-section': { file: 'pretty.mp3', ambient: 'digestion.mp3' }
        };

        const mediaList = document.getElementById('host-media-list');
        for(let i=0; i<10; i++) mediaList.innerHTML += `<video class="media-item" controls></video>`;
        for(let i=0; i<25; i++) mediaList.innerHTML += `<img class="media-item" src="https://via.placeholder.com/500x300">`;

        function startAudio() { 
            const audio = document.getElementById('bg-audio');
            audio.src = pageTracks['home-section'].file;
            audio.play(); 
            document.getElementById('start-screen').style.display = 'none'; 
            document.getElementById('bg-video').play();
        }

        function accessHost() {
            if (prompt("Enter Password:") === HOST_PASSWORD) showPage('host-section');
            else alert("Denied");
        }

        let dripInterval;
        function startDripping() {
            dripInterval = setInterval(() => {
                const drip = document.createElement('div');
                drip.className = 'drip';
                drip.style.left = Math.random() * 100 + 'vw';
                drip.style.top = '-20px';
                document.body.appendChild(drip);
                setTimeout(() => drip.remove(), 3000);
            }, 800);
        }

        function showPage(pageId) {
            const ambient = document.getElementById('ambient-audio');
            const bgAudio = document.getElementById('bg-audio');

            if (pageId === 'host-section') {
                document.body.classList.add('internal-mode');
                bgAudio.src = pageTracks['host-section'].file;
                ambient.src = pageTracks['host-section'].ambient;
                ambient.play();
                bgAudio.play();
                startDripping();
            } else {
                document.body.classList.remove('internal-mode');
                ambient.pause();
                clearInterval(dripInterval);
            }

            const target = document.getElementById(pageId);
            const transition = document.getElementById('transition-overlay');
            transition.classList.add('active');
            
            setTimeout(() => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
                target.classList.add('active');
                if (pageTracks[pageId] && pageId !== 'host-section') {
                    bgAudio.src = pageTracks[pageId].file;
                    bgAudio.play();
                }
                setTimeout(() => transition.classList.remove('active'), 200);
            }, 600);
        }
    </script>
</body>
</html>
