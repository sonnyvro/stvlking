<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SONNYVRO // STVLKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --panel: rgba(10, 0, 0, 0.85); --red: #ff0000; --dim-red: #330000; --text: #e0a0a0; }
        
        body { 
            background-color: var(--bg) !important; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('wallpaper.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text) !important; font-family: 'VT323', monospace; margin: 0; overflow: hidden; perspective: 1000px;
        }

        /* Overlays */
        #monitor-shell { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10000; border-radius: 50% / 10%; box-shadow: inset 0 0 100px 30px rgba(0,0,0,0.8); background: radial-gradient(circle at center, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%); }
        #crt-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9998; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; animation: crt-flicker 0.15s infinite; }
        #clouds-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: url('clouds.png'); z-index: 1; pointer-events: none; animation: cloudDrift 120s linear infinite; }
        @keyframes cloudDrift { from { background-position: 0 0; } to { background-position: 1000px 0; } }

        /* Audio & Layout */
        #viewport { position: relative; z-index: 3; width: 100vw; height: 100vh; overflow-y: auto; }
        .layout-stack { display: grid; gap: 25px; max-width: 600px; margin: 40px auto; padding: 20px; transition: opacity 0.5s; }
        .box { border: 1px solid var(--dim-red); background: var(--panel); padding: 25px; position: relative; }
        .track { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #110000; cursor: pointer; }
        .play-btn { width: 80px; font-family: 'Press Start 2P'; font-size: 0.6rem; color: var(--text); }
        .track.active .track-name { color: var(--red); }
        
        .walking-mode { animation: walkToHouse 2s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes walkToHouse { 0% { transform: rotateY(0deg) translateZ(0px); } 100% { transform: rotateY(0deg) translateZ(800px); } }
    </style>
</head>
<body>
    <div id="monitor-shell"></div><div id="crt-overlay"></div>
    <div id="clouds-layer"></div>

    <div id="viewport">
        <main class="layout-stack">
            <section class="box">
                <div class="box-title">BEATS FOR SALE</div>
                <div id="now-playing" style="color:red; margin-bottom:10px;">> STATUS: IDLE</div>
                <ul class="tracklist" style="list-style: none; padding: 0;">
                    <li class="track" data-src="music/widow.mp3"><span class="play-btn">[ PLAY ]</span> <span class="track-name">widow.mp3</span></li>
                    <li class="track" data-src="music/error.mp3"><span class="play-btn">[ PLAY ]</span> <span class="track-name">error.mp3</span></li>
                    <li class="track" data-src="music/killing.mp3"><span class="play-btn">[ PLAY ]</span> <span class="track-name">killing.mp3</span></li>
                </ul>
            </section>
            
            <section id="house-scene" style="display:none; text-align:center;"><h2 style="color:red;">THE DARK HOUSE</h2></section>
            <button class="home-btn">[ WALK TO HOUSE ]</button>
        </main>
    </div>

<script>
    const audioEngine = new Audio();
    const nowPlaying = document.getElementById('now-playing');

    document.querySelectorAll('.track').forEach(track => {
        track.addEventListener('click', function() {
            const src = this.getAttribute('data-src');
            if (audioEngine.src.includes(src) && !audioEngine.paused) {
                audioEngine.pause();
                this.classList.remove('active');
                nowPlaying.innerText = '> STATUS: IDLE';
            } else {
                audioEngine.src = src;
                audioEngine.play();
                document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                nowPlaying.innerText = `> PLAYING: ${this.querySelector('.track-name').innerText}`;
            }
        });
    });

    document.querySelector('.home-btn').addEventListener('click', function() {
        document.querySelector('.layout-stack').style.opacity = '0';
        document.getElementById('house-scene').style.display = 'block';
        document.getElementById('viewport').classList.add('walking-mode');
        setTimeout(() => { window.location.href = 'house.html'; }, 2000);
    });
</script>
</body>
    <div id="transition-overlay"></div>
</html>
